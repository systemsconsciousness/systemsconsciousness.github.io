<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-Time Solar System</title>
    <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.2.0/astronomy.browser.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        canvas {
            display: block;
            max-width: 100vw;
            max-height: 100vh;
        }
    </style>
</head>
<body>
    <canvas id="solarSystemCanvas"></canvas>

    <script>
        const canvas = document.getElementById('solarSystemCanvas');
        const ctx = canvas.getContext('2d');

        // Set canvas size
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Handle window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // Planet data
        const planets = [
            { name: 'Mercury', body: 'Mercury', color: '#8C7853', size: 4 },
            { name: 'Venus', body: 'Venus', color: '#FFC649', size: 7 },
            { name: 'Earth', body: 'Earth', color: '#4A90E2', size: 7 },
            { name: 'Mars', body: 'Mars', color: '#E27B58', size: 4 },
            { name: 'Jupiter', body: 'Jupiter', color: '#C88B3A', size: 16 },
            { name: 'Saturn', body: 'Saturn', color: '#FAD5A5', size: 14 },
            { name: 'Uranus', body: 'Uranus', color: '#4FD0E7', size: 8 },
            { name: 'Neptune', body: 'Neptune', color: '#4166F5', size: 8 }
        ];

        // Calculate AU to pixel conversion (dynamically scaled)
        let auToPixel = 30;
        let offsetX = canvas.width / 2;
        let offsetY = canvas.height / 2;

        // Draw orbit path
        function drawOrbit(radiusAU, color = 'rgba(255, 255, 255, 0.05)') {
            const radiusPx = radiusAU * auToPixel;
            ctx.strokeStyle = color;
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(offsetX, offsetY, radiusPx, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Draw sun
        function drawSun() {
            const sunSize = 20;
            const gradient = ctx.createRadialGradient(offsetX, offsetY, 0, offsetX, offsetY, sunSize);
            gradient.addColorStop(0, '#FDB813');
            gradient.addColorStop(1, '#FD8813');
            
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(offsetX, offsetY, sunSize, 0, Math.PI * 2);
            ctx.fill();
            
            // Sun glow
            ctx.strokeStyle = 'rgba(253, 184, 19, 0.3)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(offsetX, offsetY, sunSize + 10, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Draw planet
        function drawPlanet(x, y, radius, color) {
            ctx.fillStyle = color;
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fill();
            
            // Subtle glow
            ctx.strokeStyle = color + '80';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(x, y, radius + 2, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Get planet position from Astronomy Engine
        function getPlanetPosition(body) {
            try {
                const observer = new Astronomy.Observer(0, 0);
                const date = new Date();
                const vector = Astronomy.HeliocentricPosition(body, date);
                
                if (vector) {
                    return {
                        x: vector.x,
                        y: vector.z,  // Use z as y for top-down view
                        distance: Math.sqrt(vector.x * vector.x + vector.z * vector.z)
                    };
                }
            } catch (e) {
                console.log('Error calculating position for', body);
            }
            return null;
        }

        // Animation loop
        function animate() {
            // Clear canvas
            ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Recalculate offsets for responsiveness
            offsetX = canvas.width / 2;
            offsetY = canvas.height / 2;

            // Draw orbits for reference
            for (let planet of planets) {
                const pos = getPlanetPosition(planet.body);
                if (pos) {
                    drawOrbit(pos.distance);
                }
            }

            // Draw Sun
            drawSun();

            // Draw planets in correct positions
            for (let planet of planets) {
                const pos = getPlanetPosition(planet.body);
                if (pos) {
                    const screenX = offsetX + pos.x * auToPixel;
                    const screenY = offsetY + pos.y * auToPixel;
                    drawPlanet(screenX, screenY, planet.size, planet.color);
                }
            }

            requestAnimationFrame(animate);
        }

        // Start animation
        animate();
    </script>
</body>
</html>
